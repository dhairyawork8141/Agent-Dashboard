/* ----------------------------- Supabase (lazy, live mode only) ---------------- */
const isLive = !!(CONFIG.url && CONFIG.anon);
let _sb = null;
async function getSB() {
  if (!isLive) return null;
  if (_sb) return _sb;
  if (!window.supabase) {
    await new Promise((res, rej) => {
      const s = document.createElement("script");
      s.src = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2";
      s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });
  }
  _sb = window.supabase.createClient(CONFIG.url, CONFIG.anon);
  return _sb;
}

// Showroom business-type category -> short label for the lead-card chip.
const CAT_LABEL = {
  kitchen: "Kitchen showroom", bathroom: "Bathroom showroom", kbb: "Kitchen & Bath",
  bedroom: "Bedroom / furniture", fitter: "Fitter", interior: "Interior designer", other: "Other",
};

function tierKey(t) {
  if (!t) return "watch";
  if (t.startsWith("HOT")) return "hot";
  if (t.startsWith("WARM")) return "warm";
  return "watch";
}
function tierLabel(t) { return tierKey(t).toUpperCase(); }

function timeAgo(iso) {
  if (!iso) return "never";
  const s = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (s < 60) return "just now";
  const m = Math.floor(s / 60); if (m < 60) return m + "m ago";
  const h = Math.floor(m / 60); if (h < 24) return h + "h ago";
  const d = Math.floor(h / 24); return d + "d ago";
}

function fmtDate(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  return d.toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" });
}

// Count records per day over the last `days` days, bucketed by a timestamp field.
function dailySeries(records, field, days) {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const buckets = {};
  const order = [];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(today); d.setDate(d.getDate() - i);
    const key = d.toISOString().slice(0, 10);
    buckets[key] = 0; order.push(key);
  }
  records.forEach(r => {
    const v = r[field]; if (!v) return;
    const key = new Date(v).toISOString().slice(0, 10);
    if (key in buckets) buckets[key]++;
  });
  return order.map(date => ({ date, count: buckets[date] }));
}

/* ----------------------------- Small UI atoms --------------------------------- */
function Eyebrow({ children, className = "" }) {
  return <div className={"eyebrow text-[11px] uppercase font-semibold text-muted " + className}>{children}</div>;
}

function TierBadge({ tier }) {
  const k = tierKey(tier);
  const styles = {
    hot:   "bg-hot/10 text-hot",
    warm:  "bg-warm/10 text-warm",
    watch: "bg-watch/10 text-watch",
  }[k];
  return <span className={"inline-flex items-center gap-1.5 rounded-full px-2.5 py-0.5 text-[11px] font-semibold " + styles}>
    <span className="w-1.5 h-1.5 rounded-full" style={{ background: "currentColor" }} />
    {tierLabel(tier)}
  </span>;
}

function Toggle({ on, onClick }) {

    </button>

}

function Btn({ children, onClick, variant = "primary", type = "button", className = "" }) {
  const base = "inline-flex items-center justify-center gap-2 rounded-full text-sm font-semibold px-5 py-2.5 transition-colors disabled:opacity-50";
  const v = {
    primary:  "bg-ink text-bone hover:bg-[#2c2722]",
    ghost:    "border border-line text-ink hover:bg-[#efeadf]",
    brass:    "bg-brass text-paper hover:bg-[#946a32]",
  }[variant];
  return <button type={type} onClick={onClick} className={base + " " + v + " " + className}>{children}</button>;
}

/* The signature element: a hairline tier-distribution bar for an agent. */
function TierBar({ counts }) {
  const total = counts.hot + counts.warm + counts.watch || 1;
  const seg = (n, color) => <div style={{ width: (n / total * 100) + "%", background: color }} />;
  return (
    <div>
      <div className="flex h-1.5 w-full overflow-hidden rounded-full bg-line">
        {seg(counts.hot, "var(--color-hot)")}
        {seg(counts.warm, "var(--color-warm)")}
        {seg(counts.watch, "var(--color-watch)")}
      </div>
      <div className="mt-2 flex gap-4 text-[11px] text-muted">
        <span><b className="text-brass">{counts.hot}</b> hot</span>
        <span><b className="text-warm">{counts.warm}</b> warm</span>
        <span><b className="text-muted">{counts.watch}</b> watch</span>
      </div>
    </div>
  );
}

/* ----------------------------- Login (live only) ------------------------------ */
function Login({ onIn }) {
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);

  async function submit() {
    setBusy(true); setErr("");
    try {
      const sb = await getSB();
      const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
      if (error) throw error;
      onIn(data.session);
    } catch (e) { setErr(e.message || "Could not sign in."); }
    setBusy(false);
  }

  return (
    <div className="min-h-screen flex items-center justify-center px-6">
      <div className="w-full max-w-sm">
        <div className="flex items-center gap-2.5 mb-8">
          <span className="w-2.5 h-2.5 rounded-full bg-brass" />
          <span className="font-serif text-lg text-ink">Agent Control Desk</span>
        </div>
        <Eyebrow className="mb-2">Sign in</Eyebrow>
        <h1 className="font-serif text-3xl text-ink mb-6" style={{ letterSpacing: "-0.01em" }}>Welcome back</h1>
        <div className="space-y-3">
          <input value={email} onChange={e => setEmail(e.target.value)} placeholder="Email"
            className="w-full rounded-xl border border-line bg-paper px-4 py-3 text-sm" />
          <input value={pw} onChange={e => setPw(e.target.value)} type="password" placeholder="Password"
            onKeyDown={e => e.key === "Enter" && submit()}
            className="w-full rounded-xl border border-line bg-paper px-4 py-3 text-sm" />
          {err && <div className="text-xs text-[#9a3b2e]">{err}</div>}
          <Btn onClick={submit} className="w-full" >{busy ? "Signing in…" : "Sign in"}</Btn>
        </div>
        <p className="mt-6 text-xs text-muted">Create your login in Supabase → Authentication → Users.</p>
      </div>
    </div>
  );
}

  const editable = lead.draft_status === "pending";
  const [subject, setSubject] = useState(lead.draft_subject || "");
  const [body, setBody] = useState(lead.draft_body || "");
  const [open, setOpen] = useState(lead.draft_status === "pending");
  const badge = DRAFT_BADGE[lead.draft_status];

  const approve = () => onDraft(lead, { draft_subject: subject, draft_body: body, draft_status: "approved" });

  const reopen  = () => onDraft(lead, { draft_status: "pending" });

  return (
    <div className="mt-2 rounded-lg border border-line bg-bone px-3 py-2.5">

          {badge ? badge.label : lead.draft_status}
        </span>
        <span className="text-[11px] text-muted">{open ? "Hide" : "Review"} ▾</span>
      </button>

      {open && (
        <div className="mt-2.5 space-y-2">
          <div>
            <div className="text-[10px] uppercase tracking-wide text-muted mb-1">To</div>
            <div className="text-xs text-ink">{lead.contact_name ? lead.contact_name + " · " : ""}{lead.contact_email}</div>
          </div>
          <div>
            <div className="text-[10px] uppercase tracking-wide text-muted mb-1">Subject</div>
            <input value={subject} onChange={e => setSubject(e.target.value)} disabled={!editable}
              className="w-full rounded-lg border border-line bg-paper px-2.5 py-1.5 text-sm text-ink disabled:opacity-70" />
          </div>
          <div>
            <div className="text-[10px] uppercase tracking-wide text-muted mb-1">Body</div>
            <textarea value={body} onChange={e => setBody(e.target.value)} rows={8} disabled={!editable}
              className="w-full rounded-lg border border-line bg-paper px-2.5 py-2 text-sm text-ink leading-relaxed disabled:opacity-70" />
          </div>
          {editable && (
            <div className="flex items-center gap-2 pt-0.5">
              <button onClick={approve} className="rounded-full bg-ink text-bone text-xs font-semibold px-4 py-2 hover:bg-[#2c2722]">Approve & queue</button>
              <button onClick={reject} className="rounded-full border border-line text-muted text-xs font-semibold px-4 py-2 hover:text-[#9a3b2e]">Reject</button>
              <span className="text-[11px] text-muted">Edit freely before approving — nothing sends until you approve.</span>
            </div>
          )}
          {lead.draft_status === "approved" && (
            <div className="flex items-center gap-2 pt-0.5">
              <span className="text-[11px] text-muted">Queued. The sender will mail it on its next run.</span>
              <button onClick={reopen} className="text-[11px] font-semibold text-brass hover:underline">Edit again</button>
            </div>
          )}
          {(lead.draft_status === "rejected" || lead.draft_status === "failed") && (
            <button onClick={reopen} className="text-[11px] font-semibold text-brass hover:underline">Re-open draft</button>
          )}
        </div>
      )}
    </div>
  );
}

/* ----------------------------- Leads table ------------------------------------ */
function LeadsTable({ leads, onStatus, onDraft, showAgentHint }) {
  const [filter, setFilter] = useState("all");
  const [searchQuery, setSearchQuery] = useState("");

  const shown = leads
    .filter(l => filter === "all" ? true
      : filter === "enriched" ? !!l.contact_email
      : filter === "approval" ? l.draft_status === "pending"
      : tierKey(l.tier) === filter)
    .filter(l => {
      if (!searchQuery) return true;
      const q = searchQuery.toLowerCase();
      return (
        (l.company || "").toLowerCase().includes(q) ||
        (l.showroom_name || "").toLowerCase().includes(q) ||
        (l.title || "").toLowerCase().includes(q) ||
        (l.contact_name || "").toLowerCase().includes(q) ||
        (l.contact_email || "").toLowerCase().includes(q)
      );
    })
    .sort((a, b) => (b.score || 0) - (a.score || 0));

  const stats = {
    total: leads.length,
    website: leads.filter(l => l.website).length,
    facebook: leads.filter(l => l.social_facebook).length,
    instagram: leads.filter(l => l.social_instagram).length,
    linkedin: leads.filter(l => l.social_linkedin).length,
    twitter: leads.filter(l => l.social_twitter).length,
    youtube: leads.filter(l => l.social_youtube).length,
    tiktok: leads.filter(l => l.social_tiktok).length,
    pinterest: leads.filter(l => l.social_pinterest).length,
    houzz: leads.filter(l => l.social_houzz).length,
  };

  const pill = (key, label) => (
    <button onClick={() => setFilter(key)}
      className={"rounded-full px-3 py-1 text-xs font-semibold transition-colors " +
        (filter === key ? "bg-ink text-bone" : "border border-line text-muted hover:text-ink")}>
      {label}
    </button>
  );

  if (!leads.length)
    return <div className="rounded-2xl border border-dashed border-line p-10 text-center">
      <p className="font-serif text-xl text-ink">No leads yet</p>
      <p className="text-sm text-muted mt-1">When the agent next runs, finds land here.</p>
    </div>;

  return (
    <div>
      <div className="mb-4 space-y-3">
        <div className="flex flex-wrap gap-x-5 gap-y-2 text-[10px] uppercase tracking-wider font-semibold text-muted bg-paper px-4 py-3 rounded-xl border border-line overflow-x-auto items-center">
          <div><span className="text-ink text-sm block">{stats.total}</span> Total</div>
          <div><span className="text-ink text-sm block">{stats.website}</span> <i className="fa-solid fa-globe text-brass text-sm"></i></div>
          {stats.facebook > 0 && <div className="text-center"><span className="text-ink text-sm block">{stats.facebook}</span> <i className="fa-brands fa-facebook text-[#1877F2] text-sm"></i></div>}
          {stats.instagram > 0 && <div className="text-center"><span className="text-ink text-sm block">{stats.instagram}</span> <i className="fa-brands fa-instagram text-[#E4405F] text-sm"></i></div>}
          {stats.linkedin > 0 && <div className="text-center"><span className="text-ink text-sm block">{stats.linkedin}</span> <i className="fa-brands fa-linkedin text-[#0A66C2] text-sm"></i></div>}
          {stats.twitter > 0 && <div className="text-center"><span className="text-ink text-sm block">{stats.twitter}</span> <i className="fa-brands fa-x-twitter text-ink text-sm"></i></div>}
          {stats.youtube > 0 && <div className="text-center"><span className="text-ink text-sm block">{stats.youtube}</span> <i className="fa-brands fa-youtube text-[#FF0000] text-sm"></i></div>}
          {stats.tiktok > 0 && <div className="text-center"><span className="text-ink text-sm block">{stats.tiktok}</span> <i className="fa-brands fa-tiktok text-ink text-sm"></i></div>}
          {stats.pinterest > 0 && <div className="text-center"><span className="text-ink text-sm block">{stats.pinterest}</span> <i className="fa-brands fa-pinterest text-[#E60023] text-sm"></i></div>}
          {stats.houzz > 0 && <div className="text-center"><span className="text-ink text-sm block">{stats.houzz}</span> <i className="fa-brands fa-houzz text-[#4DBC15] text-sm"></i></div>}
        </div>
        <div className="flex flex-wrap items-center justify-between gap-3">
          <div className="flex flex-wrap gap-2">
            {pill("all", "All")}{pill("hot", "Hot")}{pill("warm", "Warm")}{pill("watch", "Watch")}{pill("enriched", "Enriched")}
            {pill("approval", "Needs approval" + (() => { const n = leads.filter(l => l.draft_status === "pending").length; return n ? " (" + n + ")" : ""; })())}
          </div>
          <input 
            type="text" 
            placeholder="Search leads..." 
            value={searchQuery}
            onChange={e => setSearchQuery(e.target.value)}
            className="rounded-full border border-line bg-bone px-3 py-1.5 text-xs w-full sm:max-w-xs focus:outline-none focus:border-brass text-ink transition-colors"
          />
        </div>
      </div>
      <div className="space-y-2.5">
        {shown.map(l => (
          <div key={l.id} className="rounded-xl border border-line bg-paper p-4">
            <div className="flex items-start justify-between gap-3">
              <div className="min-w-0">
                <div className="flex items-center gap-2 flex-wrap">
                  <TierBadge tier={l.tier} />
                  {l.category && <span className="rounded-full border border-line text-muted text-[10px] font-semibold px-2 py-0.5">{CAT_LABEL[l.category] || l.category}</span>}
                  {l.contact_email && <span className="rounded-full bg-ink text-bone text-[10px] font-semibold px-2 py-0.5">✓ Contact</span>}
                  <span className="text-[11px] text-muted">{l.source} · {timeAgo(l.found_at)}</span>
                </div>
                <div className="mt-1.5 font-serif text-lg text-ink leading-snug" style={{ letterSpacing: "-0.01em" }}>
                  {l.registered_at
                    ? (l.showroom_name || l.company || "Unnamed business")
                    : <span>{l.title} <span className="text-muted font-sans text-sm">— {l.showroom_name && !l.showroom_name.includes("unknown") ? l.showroom_name : (l.company || "company in advert")}</span></span>}
                </div>
                <div className="mt-0.5 text-xs text-muted">
                  {l.registered_at
                    ? <span><i className="fa-regular fa-calendar mr-1"></i>Registered {fmtDate(l.registered_at)}{l.location ? " · " + l.location : ""}</span>
                    : <span>{l.location || "UK"}{l.salary ? " · " + l.salary : ""}{l.decision_maker_hint ? " · " + l.decision_maker_hint : ""}{l.is_recruiter ? " · via recruiter" : ""}</span>}
                </div>
                {l.opening_line && (
                  <div className="mt-2 text-sm text-ink/80 border-l-2 border-brass pl-3">
                    <span className="text-muted italic">Opener: </span>{l.opening_line}
                  </div>
                )}
                {(l.contact_name || l.contact_email) && (
                  <div className="mt-2 rounded-lg border border-line bg-bone px-3 py-2">
                    <div className="text-[10px] uppercase tracking-wide text-muted mb-0.5">Decision-maker</div>
                    <div className="text-sm text-ink font-medium">
                      {l.contact_name || "—"}
                      {l.contact_title && <span className="text-muted font-normal"> · {l.contact_title}</span>}
                    </div>
                    <div className="mt-0.5 flex flex-wrap gap-x-3 gap-y-0.5 text-xs">
                      {l.contact_email && <a href={"mailto:" + l.contact_email} className="text-brass hover:underline">{l.contact_email}</a>}
                      {l.contact_phone && <span className="text-ink/70">{l.contact_phone}</span>}
                      {l.contact_linkedin && <a href={l.contact_linkedin} target="_blank" rel="noreferrer" className="text-brass hover:underline">LinkedIn ↗</a>}
                    </div>
                  </div>
                )}
                {(l.website || (l.url && l.url !== "#") || l.social_facebook || l.social_instagram || l.social_linkedin || l.social_twitter || l.social_youtube || l.social_tiktok || l.social_pinterest || l.social_houzz) && (
                  <div className="mt-2.5 pt-2 border-t border-line/40 flex flex-wrap items-center gap-x-4 gap-y-2">
                    {l.website && <a href={l.website} target="_blank" rel="noreferrer" className="flex items-center gap-1.5 text-[11px] uppercase tracking-wide font-semibold text-brass hover:text-ink transition-colors"><i className="fa-solid fa-globe text-sm"></i> Website</a>}
                    {l.url && l.url !== "#" && <a href={l.url} target="_blank" rel="noreferrer" className="flex items-center gap-1.5 text-[11px] uppercase tracking-wide font-semibold text-brass hover:text-ink transition-colors"><i className="fa-solid fa-arrow-up-right-from-square text-sm"></i> {l.registered_at ? "Companies House" : "View advert"}</a>}

                    <div className="flex items-center gap-3 ml-auto text-base">
                      {l.social_facebook && <a href={l.social_facebook} target="_blank" rel="noreferrer" className="text-muted hover:text-[#1877F2] transition-colors"><i className="fa-brands fa-facebook"></i></a>}
                      {l.social_instagram && <a href={l.social_instagram} target="_blank" rel="noreferrer" className="text-muted hover:text-[#E4405F] transition-colors"><i className="fa-brands fa-instagram"></i></a>}
                      {l.social_linkedin && <a href={l.social_linkedin} target="_blank" rel="noreferrer" className="text-muted hover:text-[#0A66C2] transition-colors"><i className="fa-brands fa-linkedin"></i></a>}
                      {l.social_twitter && <a href={l.social_twitter} target="_blank" rel="noreferrer" className="text-muted hover:text-ink transition-colors"><i className="fa-brands fa-x-twitter"></i></a>}
                      {l.social_youtube && <a href={l.social_youtube} target="_blank" rel="noreferrer" className="text-muted hover:text-[#FF0000] transition-colors"><i className="fa-brands fa-youtube"></i></a>}
                      {l.social_tiktok && <a href={l.social_tiktok} target="_blank" rel="noreferrer" className="text-muted hover:text-ink transition-colors"><i className="fa-brands fa-tiktok"></i></a>}
                      {l.social_pinterest && <a href={l.social_pinterest} target="_blank" rel="noreferrer" className="text-muted hover:text-[#E60023] transition-colors"><i className="fa-brands fa-pinterest"></i></a>}
                      {l.social_houzz && <a href={l.social_houzz} target="_blank" rel="noreferrer" className="text-muted hover:text-[#4DBC15] transition-colors"><i className="fa-brands fa-houzz"></i></a>}
                    </div>
                  </div>
                )}
                {filter === "approval" && l.draft_status && l.draft_status !== "none" && onDraft && (
                  <DraftPanel key={l.id + l.draft_status} lead={l} onDraft={onDraft} />
                )}
              </div>
              <div className="shrink-0 text-right">
                <select value={l.status} onChange={e => onStatus(l, e.target.value)}
                  className="rounded-lg border border-line bg-bone text-xs px-2.5 py-1.5 text-ink">
                  {STATUSES.map(s => <option key={s}>{s}</option>)}
                </select>
                {onDraft && (!l.draft_status || l.draft_status === "none") && (
                  <button onClick={() => onDraft(l, { draft_status: "requested" })}
                    className="block mt-2 ml-auto rounded-full border border-line text-xs font-semibold px-3 py-1 text-ink hover:border-brass hover:text-brass transition-colors">
                    ✎ Draft email
                  </button>

            <div className="text-sm font-semibold text-ink truncate">{a.name}</div>
            <div className="text-[11px] text-muted">

// Showroom business-type tabs. Keys match the brain's `category` output.
const SHOWROOM_CATS = [
  { key: "all",      label: "All",                 icon: "fa-list" },
  { key: "kitchen",  label: "Kitchen showrooms",   icon: "fa-kitchen-set" },
  { key: "bathroom", label: "Bathroom showrooms",  icon: "fa-bath" },
  { key: "kbb",      label: "Kitchen & Bath",      icon: "fa-house-chimney" },
  { key: "bedroom",  label: "Bedroom / furniture", icon: "fa-bed" },
  { key: "fitter",   label: "Fitters",             icon: "fa-screwdriver-wrench" },
  { key: "interior", label: "Interior designers",  icon: "fa-couch" },
  { key: "other",    label: "Other",               icon: "fa-ellipsis" },
];

function ShowroomListsView({ agents, leads, setView, onToggle, onStatus, onDraft, onAdd }) {
  const [cat, setCat] = useState("all");
  const [source, setSource] = useState("all");

  const catCount = (k) => k === "all" ? leads.length
    : leads.filter(l => (l.category || "other") === k).length;
  const byCat = cat === "all" ? leads : leads.filter(l => (l.category || "other") === cat);

  // Source buttons derive from the data, so future sources appear automatically.
  const sources = useMemo(() =>
    Array.from(new Set(byCat.map(l => l.source).filter(Boolean))).sort(), [byCat]);
  const shown = source === "all" ? byCat : byCat.filter(l => l.source === source);

  const catTab = (c) => (
    <button key={c.key} onClick={() => { setCat(c.key); setSource("all"); }}
      className={"flex items-center gap-2 rounded-xl px-3.5 py-2 text-sm font-semibold transition-colors " +
        (cat === c.key ? "bg-ink text-bone" : "border border-line text-muted hover:text-ink")}>
      <i className={"fa-solid " + c.icon + " text-xs"}></i>{c.label}
      <span className={cat === c.key ? "text-bone/70" : "text-muted"}>{catCount(c.key)}</span>
    </button>
  );
  const srcBtn = (key, label) => (
    <button key={key} onClick={() => setSource(key)}
      className={"rounded-full px-3.5 py-1.5 text-xs font-semibold transition-colors " +
        (source === key ? "bg-brass text-paper" : "border border-line text-muted hover:text-ink")}>
      {label}{key !== "all" ? " (" + byCat.filter(l => l.source === key).length + ")" : ""}
    </button>
  );

  return (
    <div className="max-w-5xl mx-auto px-6 py-9">
      <SectionHeader icon="fa-store" eyebrow="KBB showrooms — by type" title="Showroom Lists" count={leads.length} />
      <AgentStrip agents={agents} section="showroom" setView={setView} onToggle={onToggle}
        onAdd={onAdd} addType="showroom_watcher" addLabel="Add a showroom source" />

      {/* Category tabs — each business type is reached differently */}
      <div className="flex flex-wrap gap-2 mb-5">{SHOWROOM_CATS.map(catTab)}</div>

      {/* Source filter (Companies House now; more sources appear here automatically) */}
      {sources.length > 1 && (
        <div className="mb-4">
          <Eyebrow className="mb-2">Filter by source</Eyebrow>
          <div className="flex flex-wrap gap-2">
            {srcBtn("all", "All sources (" + byCat.length + ")")}
            {sources.map(s => srcBtn(s, s))}
          </div>
        </div>
      )}

      <LeadsTable leads={shown} onStatus={onStatus} onDraft={onDraft} />
    </div>
  );
}

/* ----------------------------- Agent detail ----------------------------------- */
function SettingsForm({ agent, onSave }) {
  const [s, setS] = useState(JSON.parse(JSON.stringify(agent.settings || {})));
  const [cron, setCron] = useState(agent.schedule_cron || "");
  const [dirty, setDirty] = useState(false);
  const set = (patch) => { setS(prev => ({ ...prev, ...patch })); setDirty(true); };

  const updateSearch = (i, key, val) => {
    const arr = [...(s.searches || [])]; arr[i] = { ...arr[i], [key]: val };
    set({ searches: arr });
  };
  const addSearch = () => set({ searches: [...(s.searches || []), { label: "New search", phrase: "" }] });
  const rmSearch = (i) => set({ searches: (s.searches || []).filter((_, j) => j !== i) });

  const termField = (key, label) => (
    <div>
      <Eyebrow className="mb-1.5">{label}</Eyebrow>
      <textarea
        value={(s[key] || []).join(", ")}
        onChange={e => set({ [key]: e.target.value.split(",").map(t => t.trim()).filter(Boolean) })}
        rows={2}
        className="w-full rounded-xl border border-line bg-paper px-3 py-2 text-sm text-ink" />
    </div>
  );

  return (
    <div className="space-y-8">
      {/* Searches */}
      <section>
        <div className="flex items-center justify-between mb-3">
          <Eyebrow>What it searches for</Eyebrow>
          <button onClick={addSearch} className="text-xs font-semibold text-brass hover:underline">+ Add search</button>
        </div>
        <div className="space-y-2">
          {(s.searches || []).map((q, i) => (
            <div key={i} className="flex items-center gap-2">
              <input value={q.phrase} onChange={e => updateSearch(i, "phrase", e.target.value)}
                placeholder="exact phrase"
                className="flex-1 rounded-lg border border-line bg-paper px-3 py-2 text-sm" />
              <input value={q.extra || ""} onChange={e => updateSearch(i, "extra", e.target.value)}
                placeholder="+ keyword (optional)"
                className="w-40 rounded-lg border border-line bg-paper px-3 py-2 text-sm" />
              <button onClick={() => rmSearch(i)} className="text-muted hover:text-[#9a3b2e] px-2 text-lg leading-none">×</button>
            </div>
          ))}
        </div>
      </section>

      {/* Scoring keywords */}
      <section className="grid sm:grid-cols-3 gap-4">
        {termField("hot_terms", "Hot terms")}
        {termField("warm_terms", "Warm terms")}
        {termField("watch_terms", "Watch terms")}
      </section>

      {/* Scope + toggles */}
      <section className="grid sm:grid-cols-2 gap-4">
        <div>
          <Eyebrow className="mb-1.5">Countries</Eyebrow>
          <input value={(s.countries || []).join(", ")}
            onChange={e => set({ countries: e.target.value.split(",").map(t => t.trim()).filter(Boolean) })}
            className="w-full rounded-xl border border-line bg-paper px-3 py-2 text-sm" />
        </div>
        <div>
          <Eyebrow className="mb-1.5">Only jobs newer than (days)</Eyebrow>
          <input type="number" value={s.max_days_old ?? 3}
            onChange={e => set({ max_days_old: parseInt(e.target.value || "0", 10) })}
            className="w-full rounded-xl border border-line bg-paper px-3 py-2 text-sm" />
        </div>
      </section>

      <section className="space-y-3">
        <div className="flex items-center justify-between rounded-xl border border-line bg-paper px-4 py-3">
          <div>
            <div className="text-sm font-semibold text-ink">Email me a digest</div>
            <div className="text-xs text-muted">Send new finds to your inbox each run.</div>
          </div>
          <Toggle on={!!s.send_email} onClick={() => set({ send_email: !s.send_email })} />
        </div>
        <div>
          <Eyebrow className="mb-1.5">Schedule (cron)</Eyebrow>
          <input value={cron} onChange={e => { setCron(e.target.value); setDirty(true); }}
            className="w-full rounded-xl border border-line bg-paper px-3 py-2 text-sm font-mono" />
          <div className="text-xs text-muted mt-1">Default runs 7am, 1pm, 6pm UTC, Mon–Sat.</div>
        </div>
      </section>

      <div className="flex items-center gap-3 pt-2">
        <Btn onClick={() => { onSave({ settings: s, schedule_cron: cron }); setDirty(false); }}
          variant={dirty ? "primary" : "ghost"}>
          {dirty ? "Save changes" : "Saved"}
        </Btn>
        {dirty && <span className="text-xs text-muted">Next run uses these settings.</span>}
      </div>
    </div>
  );
}

function AgentDetail({ agent, leads, setView, onSave, onToggle, onStatus, onDraft }) {
  const [tab, setTab] = useState("settings");
  const tabBtn = (key, label) => (
    <button onClick={() => setTab(key)}
      className={"text-sm font-medium pb-2 transition-colors relative " +
        (tab === key ? "text-ink" : "text-muted hover:text-ink")}>
      {label}
      {tab === key && <span className="absolute -bottom-px left-0 right-0 h-0.5 bg-brass rounded-full" />}
    </button>
  );

  return (
    <div className="max-w-3xl mx-auto px-6 py-10">
      <button onClick={() => setView({ name: sectionForType(agent.type) })} className="text-xs text-muted hover:text-ink mb-6">← Back</button>

      <div className="flex items-start justify-between gap-4 mb-1">
        <div>
          <Eyebrow className="mb-1.5">{agent.type.replace("_", " ")}</Eyebrow>
          <h1 className="font-serif text-3xl text-ink" style={{ letterSpacing: "-0.02em" }}>{agent.name}</h1>
        </div>
        <div className="flex items-center gap-2.5 pt-1">
          <span className="text-xs text-muted">{agent.enabled ? "Active" : "Paused"}</span>
          <Toggle on={agent.enabled} onClick={() => onToggle(agent)} />
        </div>
      </div>
      <div className="text-xs text-muted mb-7">Last ran {timeAgo(agent.last_run_at)} · {leads.length} leads collected</div>

      <div className="flex items-center gap-6 border-b border-line mb-7">
        {tabBtn("settings", "Settings")}
        {tabBtn("leads", "Leads (" + leads.length + ")")}
      </div>

      {tab === "settings"
        ? <SettingsForm agent={agent} onSave={(patch) => onSave(agent.id, patch)} />
        : <LeadsTable leads={leads} onStatus={onStatus} onDraft={onDraft} />}
    </div>
  );
}

/* ----------------------------- Add agent modal -------------------------------- */
function AddAgent({ onClose, onCreate, initialType }) {
  const [name, setName] = useState("");
  const [type, setType] = useState(initialType || "job_watcher");
  const TYPES = [
    { v: "job_watcher", label: "Job board watcher", hint: "Find showrooms hiring for designers." },
    { v: "contact_finder", label: "Contact finder", hint: "Enrich leads with decision-maker contacts." },
    { v: "showroom_watcher", label: "Showroom source", hint: "List KBB showrooms from a data source." },
  ];
  return (
    <div className="fixed inset-0 z-30 bg-ink/30 flex items-center justify-center px-6" onClick={onClose}>
      <div className="w-full max-w-md rounded-2xl border border-line bg-bone p-6" onClick={e => e.stopPropagation()}>
        <Eyebrow className="mb-1">New agent</Eyebrow>
        <h2 className="font-serif text-2xl text-ink mb-5" style={{ letterSpacing: "-0.01em" }}>Add an agent</h2>
        <div className="space-y-4">
          <div>
            <Eyebrow className="mb-1.5">Name</Eyebrow>
            <input value={name} onChange={e => setName(e.target.value)} placeholder="e.g. Schmidt showroom openings"
              className="w-full rounded-xl border border-line bg-paper px-3 py-2.5 text-sm" />
          </div>
          <div className="space-y-2">
            <Eyebrow className="mb-1.5">Type</Eyebrow>
            {TYPES.map(t => (
              <button key={t.v} onClick={() => setType(t.v)}
                className={"w-full text-left rounded-xl border px-4 py-3 transition-colors " +
                  (type === t.v ? "border-brass bg-paper" : "border-line hover:bg-paper")}>
                <div className="text-sm font-semibold text-ink">{t.label}</div>
                <div className="text-xs text-muted">{t.hint}</div>
              </button>
            ))}
          </div>
        </div>
        <div className="flex gap-3 mt-6">
          <Btn variant="ghost" onClick={onClose} className="flex-1">Cancel</Btn>
          <Btn onClick={() => name.trim() && onCreate({ name: name.trim(), type })} className="flex-1">Create agent</Btn>
        </div>
      </div>
    </div>
  );
}

/* ----------------------------- Account ---------------------------------------- */

    <div className="max-w-3xl mx-auto px-6 py-10">
      <Eyebrow>Account</Eyebrow>
      <h1 className="font-serif text-4xl text-ink mt-1 mb-8" style={{ letterSpacing: "-0.02em" }}>Settings</h1>
      <div className="rounded-2xl border border-line bg-paper p-5 space-y-3">
        <div className="flex justify-between text-sm">
          <span className="text-muted">Signed in as</span>

/* ----------------------------- Reports ---------------------------------------- */
function DailyBars({ series, color }) {
  const max = Math.max(1, ...series.map(s => s.count));
  return (
    <div>
      <div className="flex items-end gap-[2px] h-28">
        {series.map((s, i) => (
          <div key={i} className="flex-1 flex flex-col justify-end" title={s.date + ": " + s.count}>
            <div style={{ height: (s.count / max * 100) + "%", background: color,
                          minHeight: s.count ? "3px" : "0px" }}
                 className="rounded-t-sm hover:opacity-80 transition-opacity" />
          </div>
        ))}
      </div>
      <div className="flex justify-between text-[10px] text-muted mt-1.5">
        <span>{series[0]?.date.slice(5)}</span>
        <span>{series[Math.floor(series.length / 2)]?.date.slice(5)}</span>
        <span>today</span>
      </div>
    </div>
  );
}

function ReportCard({ title, icon, series, color }) {
  const total = series.reduce((a, s) => a + s.count, 0);
  const last7 = series.slice(-7).reduce((a, s) => a + s.count, 0);
  const today = series[series.length - 1]?.count || 0;
  return (
    <div className="rounded-2xl border border-line bg-paper p-5">
      <div className="flex items-start justify-between mb-3">
        <div className="flex items-center gap-2.5">
          <span className="w-9 h-9 rounded-xl bg-brass/10 flex items-center justify-center" style={{ color }}>
            <i className={"fa-solid " + icon}></i>
          </span>
          <div>
            <div className="text-sm font-semibold text-ink">{title}</div>
            <div className="text-[11px] text-muted">today {today} · 7d {last7} · 30d {total}</div>
          </div>
        </div>
        <div className="font-serif text-2xl text-ink" style={{ letterSpacing: "-0.02em" }}>{total}</div>
      </div>
      <DailyBars series={series} color={color} />
    </div>
  );
}

function ReportsView({ leads }) {
  const DAYS = 30;
  const added    = useMemo(() => dailySeries(leads, "found_at", DAYS), [leads]);
  const enriched = useMemo(() => dailySeries(leads, "enriched_at", DAYS), [leads]);
  const drafted  = useMemo(() => dailySeries(leads, "drafted_at", DAYS), [leads]);
  const sent     = useMemo(() => dailySeries(leads, "sent_at", DAYS), [leads]);
  return (
    <div className="max-w-5xl mx-auto px-6 py-9">
      <SectionHeader icon="fa-chart-line" eyebrow="Daily activity — last 30 days" title="Reports" count={leads.length} />
      <div className="grid sm:grid-cols-2 gap-4">
        <ReportCard title="Leads added"        icon="fa-plus"         series={added}    color="var(--color-brass)" />
        <ReportCard title="Contacts enriched"  icon="fa-address-card" series={enriched} color="#4f7d3a" />
        <ReportCard title="Emails drafted"     icon="fa-pen-nib"      series={drafted}  color="#9A7B2E" />
        <ReportCard title="Emails sent"        icon="fa-paper-plane"  series={sent}     color="var(--color-ink)" />
      </div>
      <p className="text-xs text-muted mt-5">Bars show daily counts. "Enriched" = a contact/website was found; "sent" = an approved email went out.</p>
    </div>
  );
}

/* ----------------------------- Datacenter ------------------------------------- */
function DatacenterView() {
  const [rows, setRows] = useState(null);   // source_performance rows (null = loading)
  const [hotToday, setHotToday] = useState(0);
  const [err, setErr] = useState("");
  useEffect(() => {
    if (!isLive) { setRows([]); return; }
    (async () => {
      try {
        const sb = await getSB();
        const a = await sb.from("source_performance").select("*");
        if (a.error) throw a.error;
        const b = await sb.from("hot_today").select("*");
        if (b.error) throw b.error;
        setRows(a.data || []);
        setHotToday((b.data && b.data[0] && b.data[0].hot_today) || 0);
      } catch (e) { setErr(e.message || String(e)); setRows([]); }
    })();
  }, []);

  const GOAL = 10;
  const all = rows || [];
  const totalFound = all.reduce((s, r) => s + (r.discovered || 0), 0);
  const pct = Math.min(100, Math.round(hotToday / GOAL * 100));
  const bySource = [...all].sort((a, b) => (b.hot || 0) - (a.hot || 0) || (b.discovered || 0) - (a.discovered || 0));

  return (
    <div className="max-w-5xl mx-auto px-6 py-9">
      <SectionHeader icon="fa-database" eyebrow="Shared memory — every candidate, every source" title="Datacenter" count={totalFound} />

      <div className="rounded-2xl border border-line bg-paper p-5 mb-4">
        <div className="flex items-end justify-between mb-2">
          <div className="text-sm font-semibold text-ink">HOT leads today</div>
          <div className="font-serif text-3xl text-ink" style={{ letterSpacing: "-0.02em" }}>{hotToday}<span className="text-muted text-lg"> / {GOAL}</span></div>
        </div>
        <div className="h-2 rounded-full bg-line overflow-hidden">
          <div style={{ width: pct + "%", background: "var(--color-brass)" }} className="h-full rounded-full transition-all" />
        </div>
        <div className="text-[11px] text-muted mt-1.5">Hermes steers every agent toward {GOAL} genuine HOT leads a day.</div>
      </div>

      <div className="rounded-2xl border border-line bg-paper overflow-hidden">
        <div className="px-5 py-3 border-b border-line text-sm font-semibold text-ink">What's working — by source</div>
        {rows === null ? (
          <div className="px-5 py-8 text-sm text-muted">Loading…</div>
        ) : err ? (
          <div className="px-5 py-8 text-sm text-muted">Couldn't load the datacenter: {err}</div>
        ) : bySource.length === 0 ? (
          <div className="px-5 py-8 text-sm text-muted">No candidates recorded yet — they appear here after the next agent run.</div>
        ) : (
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr className="text-[11px] uppercase tracking-wide text-muted">
                  <th className="text-left font-semibold px-5 py-2">Source</th>
                  <th className="text-right font-semibold px-3 py-2">Found</th>
                  <th className="text-right font-semibold px-3 py-2">Kept</th>
                  <th className="text-right font-semibold px-3 py-2">HOT</th>
                  <th className="text-right font-semibold px-3 py-2">HOT %</th>
                  <th className="text-right font-semibold px-3 py-2">Contacted</th>
                  <th className="text-right font-semibold px-3 py-2">Sent</th>
                  <th className="text-right font-semibold px-5 py-2">Replied</th>
                </tr>
              </thead>
              <tbody>
                {bySource.map(s => (
                  <tr key={s.source} className="border-t border-line">
                    <td className="text-left px-5 py-2.5 font-medium text-ink">{s.source}</td>
                    <td className="text-right px-3 py-2.5 text-muted">{s.discovered}</td>
                    <td className="text-right px-3 py-2.5 text-muted">{s.kept}</td>
                    <td className="text-right px-3 py-2.5 font-semibold text-ink">{s.hot}</td>
                    <td className="text-right px-3 py-2.5 text-muted">{s.discovered ? Math.round(s.hot / s.discovered * 100) : 0}%</td>
                    <td className="text-right px-3 py-2.5 text-muted">{s.contacted}</td>
                    <td className="text-right px-3 py-2.5 text-muted">{s.sent}</td>
                    <td className="text-right px-5 py-2.5 text-muted">{s.replied}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
      <p className="text-xs text-muted mt-5">Every candidate Hermes evaluates — kept or rejected — is recorded here, so you can see which sources actually produce HOT leads.</p>
    </div>
  );
}

/* ----------------------------- App -------------------------------------------- */
function App() {
  const [session, setSession] = useState(null);
  const [ready, setReady] = useState(!isLive);   // demo is ready immediately
  const [agents, setAgents] = useState(isLive ? [] : DEMO_AGENTS);
  const [leads, setLeads] = useState(isLive ? [] : DEMO_LEADS);
  const [view, setView] = useState({ name: "overview" });
  const [adding, setAdding] = useState(false);
  const [isDark, setIsDark] = useState(() => {
    return localStorage.getItem("theme") === "dark" || 
      (!localStorage.getItem("theme") && window.matchMedia("(prefers-color-scheme: dark)").matches);
  });

  useEffect(() => {
    if (isDark) document.documentElement.classList.add("dark");
    else document.documentElement.classList.remove("dark");
    localStorage.setItem("theme", isDark ? "dark" : "light");
  }, [isDark]);

  // live: restore session + load data
  useEffect(() => {
    if (!isLive) return;
    (async () => {
      const sb = await getSB();
      const { data } = await sb.auth.getSession();
      setSession(data.session);
      setReady(true);
    })();
  }, []);

  async function loadData() {
    const sb = await getSB();
    const [{ data: a }, { data: l }] = await Promise.all([
      sb.from("agents").select("*").order("created_at"),
      sb.from("leads").select("*").order("found_at", { ascending: false }),
    ]);
    setAgents(a || []); setLeads(l || []);
  }
  useEffect(() => { if (isLive && session) loadData(); }, [session]);

  const leadsByAgent = useMemo(() => {
    const m = {}; agents.forEach(a => m[a.id] = []);
    leads.forEach(l => { (m[l.agent_id] = m[l.agent_id] || []).push(l); });
    return m;
  }, [agents, leads]);

  // Categorise into the sidebar's streams. A lead is a "showroom" lead if it came from a
  // showroom-watcher agent or a showroom source (Companies House, future directories);
  // everything else is a job-ad lead.
  const jobAgents = useMemo(() => agents.filter(a => a.type === "job_watcher" || a.type === "contact_finder"), [agents]);
  const showroomAgents = useMemo(() => agents.filter(a => a.type === "showroom_watcher"), [agents]);
  // Once an email is SENT the lead is "connected" — it leaves the working lists and
  // moves to its own section, so Job Leads / Showroom Lists / approval stay fresh.
  const connectedLeads = useMemo(() => leads.filter(l => l.draft_status === "sent"), [leads]);
  const showroomIds = useMemo(() => new Set(showroomAgents.map(a => a.id)), [showroomAgents]);
  const isShowroom = (l) => showroomIds.has(l.agent_id) || (l.source || "").includes("Companies House");
  // Showroom Lists shows the FULL directory (all tiers). "Leads" (HOT+WARM) is counted
  // separately in the Overview — established WATCH showrooms are data, not leads.
  const showroomLeads = useMemo(() => leads.filter(l =>
    l.draft_status !== "sent" && isShowroom(l)
  ), [leads, showroomIds]);
  const jobLeads = useMemo(() => leads.filter(l =>
    l.draft_status !== "sent" && !isShowroom(l)
  ), [leads, showroomIds]);
  const openAdd = (t) => setAdding(t || true);

  /* mutations (write-through in live mode) */
  async function toggleAgent(a) {
    const next = !a.enabled;
    setAgents(prev => prev.map(x => x.id === a.id ? { ...x, enabled: next } : x));
    if (isLive) { const sb = await getSB(); await sb.from("agents").update({ enabled: next }).eq("id", a.id); }
  }
  async function saveAgent(id, patch) {
    setAgents(prev => prev.map(x => x.id === id ? { ...x, ...patch } : x));
    if (isLive) { const sb = await getSB(); await sb.from("agents").update(patch).eq("id", id); }
  }
  async function addAgent({ name, type }) {
    const row = { name, type, enabled: true, schedule_cron: "0 7,13,18 * * 1-6", settings: { searches: [], countries: ["gb"], max_days_old: 3 } };
    if (isLive) {
      const sb = await getSB();
      const { data } = await sb.from("agents").insert(row).select().single();
      if (data) setAgents(prev => [...prev, data]);
    } else {
      setAgents(prev => [...prev, { ...row, id: "a" + Date.now(), last_run_at: null }]);
    }
    setAdding(false);
  }
  async function setStatus(lead, status) {
    setLeads(prev => prev.map(l => l.id === lead.id ? { ...l, status } : l));
    if (isLive) { const sb = await getSB(); await sb.from("leads").update({ status }).eq("id", lead.id); }
  }
  // Draft approval: save edits + flip draft_status. The sender mails 'approved' ones.
  async function updateDraft(lead, patch) {
    setLeads(prev => prev.map(l => l.id === lead.id ? { ...l, ...patch } : l));
    if (isLive) { const sb = await getSB(); await sb.from("leads").update(patch).eq("id", lead.id); }
  }
  async function signOut() { const sb = await getSB(); await sb.auth.signOut(); setSession(null); }

  if (!ready) return <div className="min-h-screen flex items-center justify-center text-muted text-sm">Loading…</div>;
  if (isLive && !session) return <Login onIn={setSession} />;

  const email = session?.user?.email;
  const current = view.name === "agent" ? agents.find(a => a.id === view.id) : null;

  return (
    <div className="min-h-screen font-sans text-ink bg-bone flex flex-col md:flex-row">
      <Sidebar view={view} setView={setView} email={email} onSignOut={signOut} isDark={isDark} setIsDark={setIsDark} />

      <main className="flex-1 min-w-0">
        {view.name === "overview" &&
          <Overview agents={agents} allLeads={leads} jobLeads={jobLeads} showroomLeads={showroomLeads}
            setView={setView} onToggle={toggleAgent} />}

        {view.name === "job" &&
          <JobLeadsView agents={jobAgents} leads={jobLeads} setView={setView}
            onToggle={toggleAgent} onStatus={setStatus} onDraft={updateDraft} onAdd={openAdd} />}

        {view.name === "showroom" &&
          <ShowroomListsView agents={showroomAgents} leads={showroomLeads} setView={setView}
            onToggle={toggleAgent} onStatus={setStatus} onDraft={updateDraft} onAdd={openAdd} />}

        {view.name === "connected" &&
          <ConnectedView leads={connectedLeads} onStatus={setStatus} onDraft={updateDraft} />}

        {view.name === "reports" && <ReportsView leads={leads} />}

        {view.name === "datacenter" && <DatacenterView />}

        {view.name === "account" && <Account email={email} />}

        {view.name === "agent" && current &&
          <AgentDetail agent={current} leads={leadsByAgent[current.id] || []} setView={setView}
            onSave={saveAgent} onToggle={toggleAgent} onStatus={setStatus} onDraft={updateDraft} />}

        <footer className="px-6 py-10 text-[11px] text-muted border-t border-line mt-10">
          CAD Illustrators · Agent Control Desk
        </footer>
      </main>

      {adding && <AddAgent initialType={typeof adding === "string" ? adding : "job_watcher"}
        onClose={() => setAdding(false)} onCreate={addAgent} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
