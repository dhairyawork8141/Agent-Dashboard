name: VW Reply Watcher

# Closes the loop: detects inbox replies (stops chasing + opt-outs) and drafts follow-ups
# for no-reply leads. Needs the Entra app to have Microsoft Graph Mail.Read (admin consent).
on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 9,13,17 * * 1-6"   # 3x/day UTC, Mon-Sat

jobs:
  replies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r vw-contact-agent/requirements.txt
      - name: Watch replies + draft follow-ups
        env:
          AGENT_ID:             b7e6d5c4-3a2b-4c1d-9e8f-0a1b2c3d4e5f
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_2:       ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3:       ${{ secrets.GROQ_API_KEY_3 }}
          SMTP_USER:            ${{ secrets.SMTP_USER }}
          OAUTH_TENANT_ID:      ${{ secrets.OAUTH_TENANT_ID }}
          OAUTH_CLIENT_ID:      ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET:  ${{ secrets.OAUTH_CLIENT_SECRET }}
        working-directory: vw-contact-agent
        run: python watch_replies.py
