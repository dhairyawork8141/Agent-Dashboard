name: VW Send Approved Emails

# Sends ONLY drafts you approved in the dashboard (draft_status='approved').
# Run it on demand after approving, or let the schedule sweep approved ones.
on:
  workflow_dispatch: {}
  schedule:
    # Hourly during UK business hours, Mon-Fri. Each run sends a small batch (SEND_PER_RUN)
    # with jittered gaps, capped at SEND_DAILY_CAP/day - gentle warm-up for deliverability.
    - cron: "0 8,9,10,11,12,13,14,15,16 * * 1-5"

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r vw-contact-agent/requirements.txt
      - name: Send approved outreach emails
        env:
          AGENT_ID:             b7e6d5c4-3a2b-4c1d-9e8f-0a1b2c3d4e5f
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SMTP_USER:            ${{ secrets.SMTP_USER }}
          ALERT_FROM:           ${{ secrets.SMTP_USER }}
          OAUTH_TENANT_ID:      ${{ secrets.OAUTH_TENANT_ID }}
          OAUTH_CLIENT_ID:      ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET:  ${{ secrets.OAUTH_CLIENT_SECRET }}
        working-directory: vw-contact-agent
        run: python send_approved.py
