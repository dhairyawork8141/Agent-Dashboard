name: VW Contact Finder

on:
  schedule:
    - cron: "0 7,12,17,22 * * *"   # 4x/day UTC, every day (~1h after the job watcher)
  workflow_dispatch: {}

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r vw-contact-agent/requirements.txt
      - name: Sync team Excel (SharePoint → Supabase)
        env:
          AGENT_ID:             b7e6d5c4-3a2b-4c1d-9e8f-0a1b2c3d4e5f
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OAUTH_TENANT_ID:      ${{ secrets.OAUTH_TENANT_ID }}
          OAUTH_CLIENT_ID:      ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET:  ${{ secrets.OAUTH_CLIENT_SECRET }}
        run: python vw-contact-agent/excel_sync.py
      - name: Run contact-finder agent
        env:
          # Agent id is not sensitive — it's the seeded contact-finder row.
          AGENT_ID:             b7e6d5c4-3a2b-4c1d-9e8f-0a1b2c3d4e5f
          APOLLO_API_KEY:       ${{ secrets.APOLLO_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_2:       ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3:       ${{ secrets.GROQ_API_KEY_3 }}
          GH_DISPATCH_TOKEN:    ${{ secrets.DISPATCH_PAT }}   # optional: chain enrich -> draft instantly
          SERPER_API_KEY:       ${{ secrets.SERPER_API_KEY }}   # optional: Google search for web enrichment
        working-directory: vw-contact-agent
        run: python main.py
