name: VW Job Watch

on:
  schedule:
    - cron: "0 7,13,18 * * 1-6"   # 7am, 1pm, 6pm UTC, Mon-Sat
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r vw-job-agent/requirements.txt
      - name: Run job-watch agent
        env:
          ADZUNA_APP_ID:        ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:       ${{ secrets.ADZUNA_APP_KEY }}
          REED_API_KEY:         ${{ secrets.REED_API_KEY }}
          JOOBLE_API_KEY:       ${{ secrets.JOOBLE_API_KEY }}
          CAREERJET_AFFID:      ${{ secrets.CAREERJET_AFFID }}
          JSEARCH_API_KEY:      ${{ secrets.JSEARCH_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          AGENT_ID:             ${{ secrets.AGENT_ID }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          SMTP_USER:            ${{ secrets.SMTP_USER }}
          SMTP_PASS:            ${{ secrets.SMTP_PASS }}
          ALERT_FROM:           ${{ secrets.SMTP_USER }}
          ALERT_TO:             ${{ secrets.ALERT_TO }}
          OAUTH_TENANT_ID:      ${{ secrets.OAUTH_TENANT_ID }}
          OAUTH_CLIENT_ID:      ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET:  ${{ secrets.OAUTH_CLIENT_SECRET }}
        working-directory: vw-job-agent
        run: python main.py
      - name: Commit updated state
        run: |
          git config user.name  "job-watch-bot"
          git config user.email "bot@users.noreply.github.com"
          git add vw-job-agent/state/
          git diff --quiet --staged || git commit -m "Update job-watch state [skip ci]"
          git push
